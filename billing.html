<!DOCTYPE html>

    <style>

        @media (max-width: 768px) {

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="left-section">
                <button class="back-btn" onclick="location.href='index.html'">←</button>
                <div class="page-title">New Bill</div>
            </div>
        </div>
    </nav>

    <!-- Container -->
    <div class="container">
        <!-- Bill Card -->
        <div class="bill-card" id="billCard">
            <!-- 1. SHOP NAME - BOLD TOP -->
            <div class="shop-name-header">
                <h1 id="shopNameDisplay">MY SHOP</h1>
            </div>

            <!-- 2. SHOP DETAILS -->
            <div class="shop-details-section">
                <p id="shopAddressDisplay">123 Main Street, City</p>
                <p id="shopPhoneDisplay">+91 98765 43210</p>
                <p id="shopGSTDisplay" style="display:none;">GST: <span id="gstNumberDisplay"></span></p>
                <p id="shopUPIDisplay" style="display:none;">UPI: <span id="upiIdDisplay"></span></p>
            </div>

            <!-- 3. BILL DETAILS -->
            <div class="bill-details-section">
                <div class="bill-detail-item">
                    <div class="bill-detail-label">Bill No</div>
                    <div class="bill-detail-value" id="billNo">INV-0001</div>
                </div>
                <div class="bill-detail-item">
                    <div class="bill-detail-label">Date</div>
                    <div class="bill-detail-value" id="billDate"></div>
                </div>
                <div class="bill-detail-item">
                    <div class="bill-detail-label">Time</div>
                    <div class="bill-detail-value" id="billTime"></div>
                </div>
            </div>

            <!-- 4. CUSTOMER DETAILS - Select Dropdown Always Visible -->
            <div class="customer-section">
                <div class="section-title">👤 Customer Details</div>
                <div class="customer-grid">
                    <div class="form-group">
                        <label class="form-label">Customer Name</label>
                        <select class="form-select" id="customerSelect" onchange="handleCustomerSelect()">
                            <option value="">-- Select Customer --</option>
                            <option value="Round Off Customer">Round Off Customer</option>
                            <option value="__new__">+ Add New Customer</option>
                        </select>
                        <input type="text" class="form-input" id="newCustomerName"
                               placeholder="Enter new customer name"
                               style="display:none; margin-top: 8px;">
                        <button class="add-customer-btn" id="confirmNewCustomer"
                                onclick="confirmNewCustomer()"
                                style="display:none;">✓ Confirm</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-input" id="customerPhone"
                               placeholder="+91 98765 43210">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Payment Mode</label>
                        <select class="form-select" id="paymentMode">
                            <option value="Cash">Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="Card">Card</option>
                            <option value="Credit">Credit</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 5. BILL ITEMS -->
            <div class="items-section">
                <div class="section-title">📦 Bill Items</div>
                <button class="add-item-btn" onclick="addItem()">+ Add Item</button>
                <div class="items-table-wrapper">
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th style="width: 5%;">#</th>
                                <th style="width: 35%;">Item Name</th>
                                <th style="width: 12%;">Qty</th>
                                <th style="width: 15%;">Rate</th>
                                <th style="width: 10%;">GST %</th>
                                <th style="width: 18%;">Amount</th>
                                <th style="width: 5%;"></th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Totals Section -->
            <div class="totals-section">
                <div class="totals-box">
                    <div class="total-row">
                        <span>Subtotal:</span>
                        <span>₹<span id="subtotal">0.00</span></span>
                    </div>
                    <div class="total-row">
                        <span>CGST:</span>
                        <span>₹<span id="cgst">0.00</span></span>
                    </div>
                    <div class="total-row">
                        <span>SGST:</span>
                        <span>₹<span id="sgst">0.00</span></span>
                    </div>
                    <div class="total-row">
                        <span>Discount:</span>
                        <span>₹<input type="number" id="discountInput" value="0" min="0" step="0.01" style="width:80px; padding:4px 8px; border:2px solid #e2e8f0; border-radius:6px;" onchange="calculateTotals()"></span>
                    </div>
                </div>
                <div class="totals-box grand">
                    <div class="total-row grand-total">
                        <span>Grand Total:</span>
                        <span>₹<span id="grandTotal">0.00</span></span>
                    </div>
                    <div class="total-row">
                        <span>Paid Amount:</span>
                        <span><input type="number" id="paidAmount" value="0" min="0" step="0.01" style="width:120px; padding:6px 10px; border:2px solid #e2e8f0; border-radius:8px;" onchange="calculateTotals()"></span>
                    </div>
                    <div class="total-row">
                        <span>Pending:</span>
                        <span style="color:#ef4444;">₹<span id="pendingAmount">0.00</span></span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn btn-save" onclick="saveBill()">
                    💾 Save Bill
                </button>
                <button class="action-btn btn-print" onclick="printBill()">
                    🖨️ Print Bill
                </button>
                <button class="action-btn btn-whatsapp" onclick="shareWhatsApp()">
                    📱 Share WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQOR7tuWvX_ysKUOQcMnAbtVLLMIQzHEI",
            authDomain: "shop-ff6e6.firebaseapp.com",
            projectId: "shop-ff6e6",
            storageBucket: "shop-ff6e6.firebasestorage.app",
            messagingSenderId: "282249658606",
            appId: "1:282249658606:web:9bd31f378935795f52b3ff"
        };

        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {}

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let shopData = {};
        let customers = [];
        let inventory = [];
        let billItems = [];
        let billCounter = 1;

        auth.onAuthStateChanged(async user => {
            const loginType = localStorage.getItem("loginType");

            if(!user && loginType!== "dev") {
                location.href = "login.html";
                return;
            }

            currentUser = user;
            await initBilling();
        });
        
                // Handle Customer Select - Payment Method এর মতো Always Visible
        function handleCustomerSelect() {
            const select = document.getElementById("customerSelect");
            const value = select.value;

            // Add New Customer Option
            if (value === "__new__") {
                document.getElementById("newCustomerName").style.display = 'block';
                document.getElementById("confirmNewCustomer").style.display = 'block';
                document.getElementById("customerPhone").value = "";
                document.getElementById("newCustomerName").focus();
                return;
            }

            // Hide new customer input
            document.getElementById("newCustomerName").style.display = 'none';
            document.getElementById("confirmNewCustomer").style.display = 'none';

            // Round Off Customer
            if (value === "Round Off Customer" || value === "") {
                document.getElementById("customerPhone").value = "";
                return;
            }

            // Existing Customer
            const customer = customers.find(c => c.id === value || c.name === value);
            if (customer) {
                document.getElementById("customerPhone").value = customer.phone || "";
            }
        }

        // Confirm New Customer
        function confirmNewCustomer() {
            const newName = document.getElementById("newCustomerName").value.trim();
            const phone = document.getElementById("customerPhone").value.trim();

            if (!newName) {
                alert("Please enter customer name");
                return;
            }

            // Add to customers array
            const newCustomer = {
                id: 'cust_' + Date.now(),
                name: newName,
                phone: phone || '',
                createdAt: new Date().toISOString()
            };

            customers.push(newCustomer);
            localStorage.setItem("customers", JSON.stringify(customers));

            // Update dropdown
            const select = document.getElementById("customerSelect");
            const option = document.createElement("option");
            option.value = newCustomer.id;
            option.textContent = `${newCustomer.name} - ${newCustomer.phone || 'No Phone'}`;

            // Insert before "+ Add New Customer" option
            const addNewOption = select.querySelector('option[value="__new__"]');
            select.insertBefore(option, addNewOption);

            // Select the new customer
            select.value = newCustomer.id;

            // Hide new customer input
            document.getElementById("newCustomerName").style.display = 'none';
            document.getElementById("confirmNewCustomer").style.display = 'none';
            document.getElementById("newCustomerName").value = "";

            // Save to Firebase
            if (currentUser) {
                db.collection('shops').doc(currentUser.uid)
          .collection('customers').add(newCustomer).catch(e => {
                    console.error('Firebase save error:', e);
                });
            }
        }

        // Initialize Billing
        async function initBilling() {
            shopData = JSON.parse(localStorage.getItem("shopDetails") || "{}");

            if(currentUser) {
                try {
                    const doc = await db.collection('shops').doc(currentUser.uid).get();
                    if(doc.exists) {
                        shopData = {...shopData,...doc.data() };
                        localStorage.setItem("shopDetails", JSON.stringify(shopData));
                    }
                } catch(e) {
                    console.error('Firebase load error:', e);
                }
            }

            document.getElementById("shopNameDisplay").textContent = (shopData.shopName || "MY SHOP").toUpperCase();
            document.getElementById("shopAddressDisplay").textContent = shopData.address || shopData.shopAddress || "";
            document.getElementById("shopPhoneDisplay").textContent = shopData.phone || shopData.shopPhone || "";

            if(shopData.gstNumber) {
                document.getElementById("gstNumberDisplay").textContent = shopData.gstNumber;
                document.getElementById("shopGSTDisplay").style.display = 'block';
            }

            if(shopData.upiId) {
                document.getElementById("upiIdDisplay").textContent = shopData.upiId;
                document.getElementById("shopUPIDisplay").style.display = 'block';
            }

            const now = new Date();
            document.getElementById("billDate").textContent = now.toLocaleDateString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
            document.getElementById("billTime").textContent = now.toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit'
            });

            const lastBillNo = parseInt(localStorage.getItem("lastBillNo") || "0");
            billCounter = lastBillNo + 1;
            document.getElementById("billNo").textContent = `INV-${String(billCounter).padStart(4, '0')}`;

            customers = await loadCollection("customers");
            inventory = await loadCollection("inventory");

            // Populate customer select dropdown
            const select = document.getElementById("customerSelect");
            customers.forEach(c => {
                const option = document.createElement("option");
                option.value = c.id;
                option.textContent = `${c.name} - ${c.phone || 'No Phone'}`;
                select.insertBefore(option, select.querySelector('option[value="__new__"]'));
            });

            addItem();
        }

        // Load Collection Helper
        async function loadCollection(collection) {
            if (localStorage.getItem("loginType") === "dev") {
                return JSON.parse(localStorage.getItem(collection) || "[]");
            }

            if (currentUser) {
                try {
                    const snapshot = await db.collection('shops').doc(currentUser.uid)
            .collection(collection).get();
                    const data = snapshot.docs
            .filter(doc => doc.id!== '_init')
            .map(doc => ({ id: doc.id,...doc.data() }));
                    localStorage.setItem(collection, JSON.stringify(data));
                    return data;
                } catch (e) {
                    console.error('Firebase load error:', e);
                }
            }

            return JSON.parse(localStorage.getItem(collection) || "[]");
        }

        // Add Item Row - Dropdown Only from Inventory
        function addItem() {
            const tbody = document.getElementById("itemsTableBody");
            const rowIndex = billItems.length;

            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${rowIndex + 1}</td>
                <td>
                    <select class="item-name-select" onchange="updateItemFromDropdown(${rowIndex})">
                        <option value="">-- Select Item --</option>
                        ${inventory.map(i => `<option value="${i.id}">${i.name}</option>`).join('')}
                    </select>
                </td>
                <td><input type="number" class="item-qty" value="1" min="1" onchange="updateItem(${rowIndex})"></td>
                <td><input type="number" class="item-rate" value="0" min="0" step="0.01" readonly style="background:#f8fafc;"></td>
                <td><input type="number" class="item-gst" value="18" min="0" max="28" step="0.01" readonly style="background:#f8fafc;"></td>
                <td><strong class="item-amount">₹0.00</strong></td>
                <td><button class="delete-item-btn" onclick="deleteItem(${rowIndex})">🗑️</button></td>
            `;
            tbody.appendChild(row);

            billItems.push({ id: '', name: '', qty: 1, rate: 0, gst: 18, amount: 0 });
        }

        // Update Item From Dropdown
        function updateItemFromDropdown(index) {
            const rows = document.querySelectorAll("#itemsTableBody tr");
            const row = rows[index];
            if(!row) return;

            const itemId = row.querySelector(".item-name-select").value;
            const invItem = inventory.find(i => i.id === itemId);

            if(invItem) {
                row.querySelector(".item-rate").value = invItem.price || invItem.sellingPrice || 0;
                row.querySelector(".item-gst").value = invItem.gst || 18;
                billItems[index].id = invItem.id;
                billItems[index].name = invItem.name;
            }

            updateItem(index);
        }

        // Update Item Calculations
        function updateItem(index) {
            const rows = document.querySelectorAll("#itemsTableBody tr");
            const row = rows[index];
            if(!row) return;

            const qty = parseFloat(row.querySelector(".item-qty").value) || 0;
            const rate = parseFloat(row.querySelector(".item-rate").value) || 0;
            const gst = parseFloat(row.querySelector(".item-gst").value) || 0;

            const amount = qty * rate;
            const gstAmount = amount * (gst / 100);
            const totalAmount = amount + gstAmount;

            billItems[index].qty = qty;
            billItems[index].rate = rate;
            billItems[index].gst = gst;
            billItems[index].amount = amount;
            billItems[index].gstAmount = gstAmount;
            billItems[index].totalAmount = totalAmount;

            row.querySelector(".item-amount").textContent = `₹${totalAmount.toFixed(2)}`;

            calculateTotals();
        }

        // Delete Item
        function deleteItem(index) {
            billItems.splice(index, 1);
            const tbody = document.getElementById("itemsTableBody");
            tbody.innerHTML = '';
            const tempItems = [...billItems];
            billItems = [];
            tempItems.forEach(() => addItem());
            tempItems.forEach((item, i) => {
                const rows = document.querySelectorAll("#itemsTableBody tr");
                const row = rows[i];
                if(item.id) {
                    row.querySelector(".item-name-select").value = item.id;
                }
                row.querySelector(".item-qty").value = item.qty;
                row.querySelector(".item-rate").value = item.rate;
                row.querySelector(".item-gst").value = item.gst;
                updateItem(i);
            });
            calculateTotals();
        }

        // Calculate Totals
        function calculateTotals() {
            const subtotal = billItems.reduce((sum, item) => sum + (item.amount || 0), 0);
            const gstTotal = billItems.reduce((sum, item) => sum + (item.gstAmount || 0), 0);
            const cgst = gstTotal / 2;
            const sgst = gstTotal / 2;
            const discount = parseFloat(document.getElementById("discountInput").value) || 0;
            const grandTotal = subtotal + gstTotal - discount;
            const paid = parseFloat(document.getElementById("paidAmount").value) || 0;
            const pending = grandTotal - paid;

            document.getElementById("subtotal").textContent = subtotal.toFixed(2);
            document.getElementById("cgst").textContent = cgst.toFixed(2);
            document.getElementById("sgst").textContent = sgst.toFixed(2);
            document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);
            document.getElementById("pendingAmount").textContent = pending.toFixed(2);
        }

        // Save Bill
        async function saveBill() {
            if(billItems.length === 0 ||!billItems[0].name) {
                alert('Please add at least one item');
                return;
            }

            const select = document.getElementById("customerSelect");
            let customerName = "Round Off Customer";
            let customerId = "";

            if (select.value && select.value!== "__new__") {
                if (select.value === "Round Off Customer") {
                    customerName = "Round Off Customer";
                } else {
                    const customer = customers.find(c => c.id === select.value);
                    if (customer) {
                        customerName = customer.name;
                        customerId = customer.id;
                    }
                }
            }

            const customerPhone = document.getElementById("customerPhone").value.trim();

            const billData = {
                billNo: document.getElementById("billNo").textContent,
                date: new Date().toISOString(),
                customerName: customerName,
                customerId: customerId,
                customerPhone: customerPhone,
                paymentMode: document.getElementById("paymentMode").value,
                items: billItems.filter(item => item.name),
                subtotal: parseFloat(document.getElementById("subtotal").textContent),
                cgst: parseFloat(document.getElementById("cgst").textContent),
                sgst: parseFloat(document.getElementById("sgst").textContent),
                discount: parseFloat(document.getElementById("discountInput").value) || 0,
                total: parseFloat(document.getElementById("grandTotal").textContent),
                paid: parseFloat(document.getElementById("paidAmount").value) || 0,
                pending: parseFloat(document.getElementById("pendingAmount").textContent),
                createdAt: new Date().toISOString()
            };

            const sales = JSON.parse(localStorage.getItem("sales") || "[]");
            sales.push(billData);
            localStorage.setItem("sales", JSON.stringify(sales));
            localStorage.setItem("lastBillNo", billCounter);

            if(currentUser) {
                try {
                    await db.collection('shops').doc(currentUser.uid)
            .collection('sales').add(billData);
                } catch(e) {
                    console.error('Firebase save error:', e);
                }
            }

            alert('Bill saved successfully!');
            location.href = 'index.html';
        }

        // Print Bill
        function printBill() {
            window.print();
        }

        // Share WhatsApp
        function shareWhatsApp() {
            const select = document.getElementById("customerSelect");
            let customerName = "Round Off Customer";
            if (select.value && select.value!== "__new__") {
                if (select.value === "Round Off Customer") {
                    customerName = "Round Off Customer";
                } else {
                    const customer = customers.find(c => c.id === select.value);
                    if (customer) customerName = customer.name;
                }
            }

            const total = document.getElementById("grandTotal").textContent;
            const billNo = document.getElementById("billNo").textContent;
            const shopName = shopData.shopName || 'MY SHOP';
            const upiId = shopData.upiId || '';

            let message = `*${shopName}*\n\n`;
            message += `Bill No: ${billNo}\n`;
            message += `Customer: ${customerName}\n`;
            message += `Total: ₹${total}\n\n`;
            message += `Items:\n`;
            billItems.forEach((item, i) => {
                if(item.name) {
                    message += `${i+1}. ${item.name} - ${item.qty} x ₹${item.rate} = ₹${item.totalAmount.toFixed(2)}\n`;
                }
            });

            if(upiId) {
                message += `\nPay via UPI: ${upiId}`;
            }

            message += `\n\nThank you for your business!`;

            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
