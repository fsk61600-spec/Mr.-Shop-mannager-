<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Login - Melon Hardware</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #f1f5f9;
            position: relative;
            overflow: hidden;
        }

        /* Soft Background Gradient */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #ddd6fe 100%);
            opacity: 1;
        }

        /* One Soft Orb - Light Theme */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #60a5fa, transparent);
            top: -100px;
            right: -100px;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(-40px, 40px) scale(1.1);
            }
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
        }

        /* WHITE CARD - Normal Like Before */
        .auth-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 45px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Logo - Normal + Pulse Animation */
        .shop-logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .auth-header h1 {
            font-size: 36px;
            margin: 0 0 8px 0;
            color: #0f172a;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .auth-header p {
            color: #64748b;
            font-size: 15px;
            margin: 0;
            font-weight: 500;
        }

        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 16px 20px;
            border-radius: 14px;
            margin: 20px 0;
            text-align: center;
            display: none;
            font-weight: 600;
            border: 1px solid #fecaca;
            animation: errorShake 0.5s;
        }

        @keyframes errorShake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .error-msg.show {
            display: block;
        }

        .success-msg {
            background: #f0fdf4;
            color: #16a34a;
            padding: 16px 20px;
            border-radius: 14px;
            margin: 20px 0;
            text-align: center;
            display: none;
            font-weight: 600;
            border: 1px solid #bbf7d0;
        }

        .success-msg.show {
            display: block;
        }

        /* WOW Button Animations */
        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            margin-bottom: 16px;
            color: white;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* Shine Effect - WOW */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(-1px);
        }

        .btn-google {
            background: linear-gradient(135deg, #4285F4 0%, #34A853 100%);
            box-shadow: 0 8px 20px rgba(66, 133, 244, 0.3);
        }

        .btn-dev {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-register {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        .google-icon {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .google-icon svg {
            width: 100%;
            height: 100%;
        }

        .btn-icon {
            font-size: 22px;
        }

        .loading-spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        button.loading {
            pointer-events: none;
        }

        button.loading .loading-spinner {
            display: inline-block;
        }

        button.loading .btn-text,
        button.loading .google-icon,
        button.loading .btn-icon {
            visibility: hidden;
        }

        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            background: #ffffff;
            padding: 8px 20px;
            position: relative;
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #e2e8f0;
        }

        .auth-footer p {
            color: #94a3b8;
            margin: 0;
            font-size: 12px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 35px 28px;
            }

            .auth-header h1 {
                font-size: 32px;
            }

            .shop-logo {
                width: 80px;
                height: 80px;
                font-size: 42px;
            }

            button {
                padding: 16px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="orb orb1"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="shop-logo">🏪</div>
                <h1>Melon Hardware</h1>
                <p>Inventory & Billing Management</p>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <button onclick="loginWithGoogle()" id="googleLoginBtn" class="btn-google">
                <span class="google-icon">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                </span>
                <span class="btn-text">Continue with Google</span>
                <span class="loading-spinner"></span>
            </button>






            <div class="divider">
                <span>New User?</span>
            </div>

            <button onclick="goToRegister()" id="registerBtn" class="btn-register">
                <span class="btn-icon">📝</span>
                <span class="btn-text">Register New Shop</span>
            </button>

            <div class="auth-footer">
                <p>🔒 Secure • ⚡ Fast • 🎯 Reliable</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQOR7tuWvX_ysKUOQcMnAbtVLLMIQzHEI",
            authDomain: "shop-ff6e6.firebaseapp.com",
            projectId: "shop-ff6e6",
            storageBucket: "shop-ff6e6.firebasestorage.app",
            messagingSenderId: "282249658606",
            appId: "1:282249658606:web:9bd31f378935795f52b3ff",
            measurementId: "G-Z7SXY9D2NQ"
        };

        try {
            firebase.initializeApp(firebaseConfig);
        } catch (e) {
            console.log("Firebase already initialized");
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        function showError(message) {
            let errorDiv = document.getElementById("errorMsg");
            errorDiv.innerText = message;
            errorDiv.classList.add("show");
            setTimeout(() => {
                errorDiv.classList.remove("show");
            }, 5000);
        }

        function showSuccess(message) {
            let successDiv = document.getElementById("successMsg");
            successDiv.innerText = message;
            successDiv.classList.add("show");
            setTimeout(() => {
                successDiv.classList.remove("show");
            }, 3000);
        }

        function setButtonLoading(buttonId, isLoading) {
            let btn = document.getElementById(buttonId);
            if (isLoading) {
                btn.classList.add("loading");
            } else {
                btn.classList.remove("loading");
            }
        }

        function goToRegister() {
            location.href = "register.html";
        }

        // GOOGLE LOGIN - Firebase use korbe
        async function loginWithGoogle() {
            setButtonLoading("googleLoginBtn", true);
            let provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({
                prompt: 'select_account'
            });

            try {
                let result = await auth.signInWithPopup(provider);
                let user = result.user;

                // Firebase theke shop data check
                let shopDoc = await db.collection("shops").doc(user.uid).get();

                if (!shopDoc.exists || !shopDoc.data().registered) {
                    await auth.signOut();
                    showError("⚠️ Shop Not Registered! Please register your shop first.");
                    setButtonLoading("googleLoginBtn", false);
                    setTimeout(() => location.href = "register.html", 2000);
                    return;
                }

                // Firebase theke data localStorage e cache
                const shopData = shopDoc.data();
                localStorage.setItem("shopUser", user.email);
                localStorage.setItem("shopRegistered", "true");
                localStorage.setItem("shopDetails", JSON.stringify(shopData));
                localStorage.setItem("loginType", "google");
                localStorage.setItem("userUID", user.uid);

                showSuccess("✅ Login Successful! Welcome back to " + shopData.shopName);
                setTimeout(() => location.href = "dashboard.html", 1000);

            } catch (err) {
                setButtonLoading("googleLoginBtn", false);
                if (err.code === "auth/popup-closed-by-user") {
                    showError("❌ Login cancelled. Please try again.");
                } else if (err.code === "auth/popup-blocked") {
                    showError("❌ Popup blocked! Please allow popups.");
                } else {
                    showError("❌ Login failed: " + err.message);
                }
            }
        }

        // DEV LOGIN - Firebase use korbe NA, only LocalStorage
        function devLogin() {
            if (!confirm("⚡ Dev Login (Test Mode)\n\nThis uses LocalStorage only!\nNo Firebase data will be used.\nContinue?")) return;

            let devShopData = {
                shopName: "Dev Test Shop",
                ownerName: "Developer",
                shopPhone: "9999999999",
                shopAddress: "Test Address",
                upiId: "test@paytm",
                registered: true,
                createdAt: new Date().toISOString()
            };

            localStorage.setItem("shopUser", "dev@test.com");
            localStorage.setItem("shopRegistered", "true");
            localStorage.setItem("shopDetails", JSON.stringify(devShopData));
            localStorage.setItem("loginType", "dev");

            // Initialize empty arrays if not exists
            if (!localStorage.getItem("customers")) localStorage.setItem("customers", "[]");
            if (!localStorage.getItem("inventory")) localStorage.setItem("inventory", "[]");
            if (!localStorage.getItem("sales")) localStorage.setItem("sales", "[]");
            if (!localStorage.getItem("payments")) localStorage.setItem("payments", "[]");

            showSuccess("✅ Dev Login Successful! (LocalStorage Mode)");
            setTimeout(() => location.href = "index.html", 1000);
        }

        // Auto redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user && localStorage.getItem("shopRegistered") === "true") {
                location.href = "index.html";
            }
        });
    </script>
</body>

</html>
