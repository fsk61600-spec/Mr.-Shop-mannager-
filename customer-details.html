<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Customer Details - My Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            color: #0f172a;
            min-height: 100vh;
        }

.navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

.nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

.left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

.back-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: 0.3s;
        }

.back-btn:hover {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            transform: scale(1.08) rotate(-5deg);
        }

.page-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

.container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

.profile-card {
            background: white;
            border-radius: 24px;
            padding: 36px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

.profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            padding-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

.profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: white;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

.profile-info {
            flex: 1;
        }

.profile-name {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }

.profile-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

.profile-detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #64748b;
            font-weight: 600;
        }

.profile-actions {
            display: flex;
            gap: 12px;
        }

.action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

.btn-edit {
            background: #eff6ff;
            color: #3b82f6;
        }

.btn-edit:hover {
            background: #dbeafe;
        }

.btn-whatsapp {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
        }

.btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.5);
        }

.stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

.stat-card {
            padding: 24px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

.stat-card.highlight {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-color: #bfdbfe;
        }

.stat-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

.stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
        }

.stat-value.pending {
            color: #ef4444;
        }

.stat-value.paid {
            color: #10b981;
        }

.section-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

.bills-section {
            background: white;
            border-radius: 20px;
            padding: 28px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

.bills-table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

.bills-table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
        }

.bills-table thead {
            background: #f8fafc;
        }

.bills-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            white-space: nowrap;
        }

.bills-table td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            font-weight: 600;
        }

.bills-table tr:last-child td {
            border-bottom: none;
        }

.bills-table tr:hover {
            background: #f8fafc;
        }

.bill-no {
            color: #3b82f6;
            font-weight: 800;
            cursor: pointer;
        }

.bill-no:hover {
            text-decoration: underline;
        }

.status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

.status-paid {
            background: #dcfce7;
            color: #15803d;
        }

.status-pending {
            background: #fef3c7;
            color: #b45309;
        }

.status-partial {
            background: #dbeafe;
            color: #1e40af;
        }

.empty-bills {
            text-align: center;
            padding: 40px 20px;
        }

.empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

.empty-text {
            font-size: 16px;
            font-weight: 700;
            color: #64748b;
        }

        @media (max-width: 768px) {
.container { padding: 20px 16px; }
.profile-card { padding: 24px 20px; }
.profile-header { flex-direction: column; text-align: center; }
.profile-actions { width: 100%; }
.action-btn { flex: 1; }
.stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="left-section">
                <button class="back-btn" onclick="location.href='customers.html'">←</button>
                <div class="page-title">Customer Details</div>
            </div>
        </div>
    </nav>

    <!-- Container -->
    <div class="container">
        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-info">
                    <div class="profile-name" id="profileName">Loading...</div>
                    <div class="profile-details">
                        <div class="profile-detail-item">
                            <span>📞</span>
                            <span id="profilePhone">-</span>
                        </div>
                        <div class="profile-detail-item">
                            <span>✉️</span>
                            <span id="profileEmail">-</span>
                        </div>
                        <div class="profile-detail-item">
                            <span>📍</span>
                            <span id="profileAddress">-</span>
                        </div>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="action-btn btn-edit" onclick="editCustomer()">
                        <span>✏️</span>
                        <span>Edit</span>
                    </button>
                    <button class="action-btn btn-whatsapp" onclick="shareWhatsApp()">
                        <span>📱</span>
                        <span>WhatsApp</span>
                    </button>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card highlight">
                    <div class="stat-label">Total Bills</div>
                    <div class="stat-value" id="totalBills">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Purchase</div>
                    <div class="stat-value" id="totalPurchase">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Paid</div>
                    <div class="stat-value paid" id="totalPaid">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending Amount</div>
                    <div class="stat-value pending" id="pendingAmount">₹0</div>
                </div>
            </div>
        </div>

        <!-- Bills Section -->
        <div class="bills-section">
            <div class="section-title">
                <span>📋</span>
                <span>Bill History</span>
            </div>
            <div class="bills-table-wrapper">
                <table class="bills-table">
                    <thead>
                        <tr>
                            <th>Bill No</th>
                            <th>Date</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Paid</th>
                            <th>Pending</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="billsTableBody">
                        <!-- Bills will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQOR7tuWvX_ysKUOQcMnAbtVLLMIQzHEI",
            authDomain: "shop-ff6e6.firebaseapp.com",
            projectId: "shop-ff6e6",
            storageBucket: "shop-ff6e6.firebasestorage.app",
            messagingSenderId: "282249658606",
            appId: "1:282249658606:web:9bd31f378935795f52b3ff"
        };

        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {}

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let customer = null;
        let customerSales = [];

        // Get customer ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id');

        if (!customerId) {
            alert('Customer ID not found');
            location.href = 'customers.html';
        }

        auth.onAuthStateChanged(async user => {
            const loginType = localStorage.getItem("loginType");

            if(!user && loginType!== "dev") {
                location.href = "login.html";
                return;
            }

            currentUser = user;
            await loadCustomerData();
            renderCustomerDetails();
        });

        async function loadCustomerData() {
            const customers = await loadCollection("customers");
            const sales = await loadCollection("sales");

            customer = customers.find(c => c.id === customerId);
            if (!customer) {
                alert('Customer not found');
                location.href = 'customers.html';
                return;
            }

            customerSales = sales.filter(s => s.customerId === customerId || s.customerName === customer.name);
        }

        async function loadCollection(collection) {
            if (localStorage.getItem("loginType") === "dev") {
                return JSON.parse(localStorage.getItem(collection) || "[]");
            }

            if (currentUser) {
                try {
                    const snapshot = await db.collection('shops').doc(currentUser.uid)
          .collection(collection).get();
                    const data = snapshot.docs
          .filter(doc => doc.id!== '_init')
          .map(doc => ({ id: doc.id,...doc.data() }));
                    localStorage.setItem(collection, JSON.stringify(data));
                    return data;
                } catch (e) {
                    console.error('Firebase load error:', e);
                }
            }

            return JSON.parse(localStorage.getItem(collection) || "[]");
        }

        function renderCustomerDetails() {
            // Profile info
            const initials = customer.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById("profileAvatar").textContent = initials;
            document.getElementById("profileName").textContent = customer.name;
            document.getElementById("profilePhone").textContent = customer.phone || 'Not provided';
            document.getElementById("profileEmail").textContent = customer.email || 'Not provided';
            document.getElementById("profileAddress").textContent = customer.address || 'Not provided';

            // Calculate stats
            const totalBills = customerSales.length;
            const totalPurchase = customerSales.reduce((sum, s) => sum + (s.total || 0), 0);
            const totalPaid = customerSales.reduce((sum, s) => sum + (s.paid || 0), 0);
            const pendingAmount = customerSales.reduce((sum, s) => sum + (s.pending || 0), 0);

            document.getElementById("totalBills").textContent = totalBills;
            document.getElementById("totalPurchase").textContent = `₹${totalPurchase.toFixed(0)}`;
            document.getElementById("totalPaid").textContent = `₹${totalPaid.toFixed(0)}`;
            document.getElementById("pendingAmount").textContent = `₹${pendingAmount.toFixed(0)}`;

            // Render bills table
            const tbody = document.getElementById("billsTableBody");

            if (customerSales.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-bills">
                                <div class="empty-icon">📋</div>
                                <div class="empty-text">No bills found</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = customerSales.sort((a, b) => new Date(b.date) - new Date(a.date)).map(bill => {
                const date = new Date(bill.date).toLocaleDateString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });

                const itemCount = bill.items? bill.items.length : 0;
                const status = bill.pending === 0? 'paid' : bill.paid > 0? 'partial' : 'pending';
                const statusText = status === 'paid'? 'Paid' : status === 'partial'? 'Partial' : 'Pending';

                return `
                    <tr>
                        <td><span class="bill-no" onclick="viewBill('${bill.billNo}')">${bill.billNo}</span></td>
                        <td>${date}</td>
                        <td>${itemCount} items</td>
                        <td>₹${(bill.total || 0).toFixed(2)}</td>
                        <td>₹${(bill.paid || 0).toFixed(2)}</td>
                        <td>₹${(bill.pending || 0).toFixed(2)}</td>
                        <td><span class="status-badge status-${status}">${statusText}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function editCustomer() {
            location.href = `customers.html`;
        }

        function shareWhatsApp() {
            const totalBills = customerSales.length;
            const totalPurchase = customerSales.reduce((sum, s) => sum + (s.total || 0), 0);
            const pendingAmount = customerSales.reduce((sum, s) => sum + (s.pending || 0), 0);

            let message = `*Customer Details*\n\n`;
            message += `Name: ${customer.name}\n`;
            message += `Phone: ${customer.phone || 'N/A'}\n`;
            message += `Total Bills: ${totalBills}\n`;
            message += `Total Purchase: ₹${totalPurchase.toFixed(2)}\n`;
            message += `Pending Amount: ₹${pendingAmount.toFixed(2)}\n\n`;
            message += `Thank you for your business!`;

            const whatsappUrl = `https://wa.me/${customer.phone || ''}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        function viewBill(billNo) {
            location.href = 'all-bills.html';
        }
    </script>
</body>
</html>
