<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Inventory - My Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            color: #0f172a;
            min-height: 100vh;
        }

.navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

.nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

.left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

.back-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: 0.3s;
        }

.back-btn:hover {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            transform: scale(1.08) rotate(-5deg);
        }

.page-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

.container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

.stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

.stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

.stat-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

.stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
        }

.stat-value.low {
            color: #ef4444;
        }

.top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

.search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

.search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

.search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

.search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #64748b;
        }

.filter-select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }

.add-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

.add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.5);
        }

.inventory-table-wrapper {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            overflow-x: auto;
        }

.inventory-table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
        }

.inventory-table thead {
            background: #f8fafc;
        }

.inventory-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            white-space: nowrap;
        }

.inventory-table td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 15px;
            font-weight: 600;
        }

.inventory-table tr:last-child td {
            border-bottom: none;
        }

.inventory-table tr:hover {
            background: #f8fafc;
        }

.item-name {
            font-weight: 800;
            color: #0f172a;
        }

.stock-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

.stock-high {
            background: #dcfce7;
            color: #15803d;
        }

.stock-medium {
            background: #fef3c7;
            color: #b45309;
        }

.stock-low {
            background: #fee2e2;
            color: #dc2626;
        }

.item-actions {
            display: flex;
            gap: 8px;
        }

.action-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

.btn-edit {
            background: #eff6ff;
            color: #3b82f6;
        }

.btn-edit:hover {
            background: #dbeafe;
        }

.btn-delete {
            background: #fef2f2;
            color: #ef4444;
        }

.btn-delete:hover {
            background: #fee2e2;
        }

.empty-state {
            text-align: center;
            padding: 60px 20px;
        }

.empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

.empty-text {
            font-size: 18px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

.empty-subtext {
            font-size: 14px;
            color: #94a3b8;
        }

        /* Modal */
.modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

.modal.active {
            display: flex;
        }

.modal-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            animation: modalSlideIn 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.9) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

.modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            color: #0f172a;
        }

.form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

.form-group {
            margin-bottom: 20px;
        }

.form-group.full {
            grid-column: 1 / -1;
        }

.form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

.form-input,.form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

.form-input:focus,.form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

.modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

.modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }

.btn-cancel {
            background: #f1f5f9;
            color: #64748b;
        }

.btn-cancel:hover {
            background: #e2e8f0;
        }

.btn-save {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
        }

.btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.6);
        }

        @media (max-width: 768px) {
.container { padding: 20px 16px; }
.form-grid { grid-template-columns: 1fr; }
.stats-grid { grid-template-columns: 1fr 1fr; }
.top-actions { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="left-section">
                <button class="back-btn" onclick="location.href='index.html'">←</button>
                <div class="page-title">Inventory</div>
            </div>
        </div>
    </nav>

    <!-- Container -->
    <div class="container">
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Items</div>
                <div class="stat-value" id="totalItems">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Stock Value</div>
                <div class="stat-value" id="totalValue">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Low Stock Items</div>
                <div class="stat-value low" id="lowStockCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Out of Stock</div>
                <div class="stat-value low" id="outOfStockCount">0</div>
            </div>
        </div>

        <!-- Top Actions -->
        <div class="top-actions">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput"
                       placeholder="Search items..."
                       oninput="filterInventory()">
            </div>
            <select class="filter-select" id="stockFilter" onchange="filterInventory()">
                <option value="all">All Stock</option>
                <option value="high">In Stock</option>
                <option value="low">Low Stock</option>
                <option value="out">Out of Stock</option>
            </select>
            <button class="add-btn" onclick="openAddModal()">
                <span>➕</span>
                <span>Add Item</span>
            </button>
        </div>

        <!-- Inventory Table -->
        <div class="inventory-table-wrapper">
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Category</th>
                        <th>Stock</th>
                        <th>Unit</th>
                        <th>Buy Price</th>
                        <th>Sell Price</th>
                        <th>GST %</th>
                        <th>Value</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <!-- Items will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Add Item</div>
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">Item Name *</label>
                    <input type="text" class="form-input" id="modalName" placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <input type="text" class="form-input" id="modalCategory" placeholder="e.g. Electronics">
                </div>
                <div class="form-group">
                    <label class="form-label">Unit</label>
                    <select class="form-select" id="modalUnit">
                        <option value="Pcs">Pcs</option>
                        <option value="Kg">Kg</option>
                        <option value="Ltr">Ltr</option>
                        <option value="Mtr">Mtr</option>
                        <option value="Box">Box</option>
                        <option value="Pack">Pack</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Quantity *</label>
                    <input type="number" class="form-input" id="modalStock" placeholder="0" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Low Stock Alert</label>
                    <input type="number" class="form-input" id="modalLowStock" placeholder="5" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Buy Price *</label>
                    <input type="number" class="form-input" id="modalBuyPrice" placeholder="0" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Sell Price *</label>
                    <input type="number" class="form-input" id="modalSellPrice" placeholder="0" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">GST %</label>
                    <input type="number" class="form-input" id="modalGst" placeholder="18" min="0" max="28" step="0.01" value="18">
                </div>
                <div class="form-group">
                    <label class="form-label">HSN Code</label>
                    <input type="text" class="form-input" id="modalHsn" placeholder="Enter HSN code">
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn btn-save" onclick="saveItem()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQOR7tuWvX_ysKUOQcMnAbtVLLMIQzHEI",
            authDomain: "shop-ff6e6.firebaseapp.com",
            projectId: "shop-ff6e6",
            storageBucket: "shop-ff6e6.firebasestorage.app",
            messagingSenderId: "282249658606",
            appId: "1:282249658606:web:9bd31f378935795f52b3ff"
        };

        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {}

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let inventory = [];
        let editingItemId = null;

        auth.onAuthStateChanged(async user => {
            const loginType = localStorage.getItem("loginType");

            if(!user && loginType!== "dev") {
                location.href = "login.html";
                return;
            }

            currentUser = user;
            await loadInventory();
            renderInventory();
            updateStats();
        });

        async function loadInventory() {
            inventory = await loadCollection("inventory");
        }

        async function loadCollection(collection) {
            if (localStorage.getItem("loginType") === "dev") {
                return JSON.parse(localStorage.getItem(collection) || "[]");
            }

            if (currentUser) {
                try {
                    const snapshot = await db.collection('shops').doc(currentUser.uid)
          .collection(collection).get();
                    const data = snapshot.docs
          .filter(doc => doc.id!== '_init')
          .map(doc => ({ id: doc.id,...doc.data() }));
                    localStorage.setItem(collection, JSON.stringify(data));
                    return data;
                } catch (e) {
                    console.error('Firebase load error:', e);
                }
            }

            return JSON.parse(localStorage.getItem(collection) || "[]");
        }

        function updateStats() {
            const totalItems = inventory.length;
            const totalValue = inventory.reduce((sum, item) => sum + ((item.stock || 0) * (item.buyPrice || 0)), 0);
            const lowStockCount = inventory.filter(item => {
                const stock = item.stock || 0;
                const lowStock = item.lowStock || 5;
                return stock > 0 && stock <= lowStock;
            }).length;
            const outOfStockCount = inventory.filter(item => (item.stock || 0) === 0).length;

            document.getElementById("totalItems").textContent = totalItems;
            document.getElementById("totalValue").textContent = `₹${totalValue.toFixed(0)}`;
            document.getElementById("lowStockCount").textContent = lowStockCount;
            document.getElementById("outOfStockCount").textContent = outOfStockCount;
        }

        function renderInventory() {
            const tbody = document.getElementById("inventoryTableBody");
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const stockFilter = document.getElementById("stockFilter").value;

            let filtered = inventory.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm) ||
                                     (item.category && item.category.toLowerCase().includes(searchTerm));

                const stock = item.stock || 0;
                const lowStock = item.lowStock || 5;
                let matchesStock = true;

                if (stockFilter === 'high') matchesStock = stock > lowStock;
                else if (stockFilter === 'low') matchesStock = stock > 0 && stock <= lowStock;
                else if (stockFilter === 'out') matchesStock = stock === 0;

                return matchesSearch && matchesStock;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9">
                            <div class="empty-state">
                                <div class="empty-icon">📦</div>
                                <div class="empty-text">No items found</div>
                                <div class="empty-subtext">Add your first item to get started</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(item => {
                const stock = item.stock || 0;
                const lowStock = item.lowStock || 5;
                const value = stock * (item.buyPrice || 0);

                let stockClass = 'stock-high';
                let stockText = 'In Stock';
                if (stock === 0) {
                    stockClass = 'stock-low';
                    stockText = 'Out of Stock';
                } else if (stock <= lowStock) {
                    stockClass = 'stock-medium';
                    stockText = 'Low Stock';
                }

                return `
                    <tr>
                        <td class="item-name">${item.name}</td>
                        <td>${item.category || '-'}</td>
                        <td>
                            <span class="stock-badge ${stockClass}">${stock} ${item.unit || 'Pcs'}</span>
                        </td>
                        <td>${item.unit || 'Pcs'}</td>
                        <td>₹${(item.buyPrice || 0).toFixed(2)}</td>
                        <td>₹${(item.sellPrice || item.price || 0).toFixed(2)}</td>
                        <td>${item.gst || 18}%</td>
                        <td>₹${value.toFixed(2)}</td>
                        <td>
                            <div class="item-actions">
                                <button class="action-btn btn-edit" onclick="openEditModal('${item.id}')">Edit</button>
                                <button class="action-btn btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterInventory() {
            renderInventory();
        }

        function openAddModal() {
            editingItemId = null;
            document.getElementById("modalTitle").textContent = "Add Item";
            document.getElementById("modalName").value = "";
            document.getElementById("modalCategory").value = "";
            document.getElementById("modalUnit").value = "Pcs";
            document.getElementById("modalStock").value = "";
            document.getElementById("modalLowStock").value = "5";
            document.getElementById("modalBuyPrice").value = "";
            document.getElementById("modalSellPrice").value = "";
            document.getElementById("modalGst").value = "18";
            document.getElementById("modalHsn").value = "";
            document.getElementById("itemModal").classList.add("active");
        }

        function openEditModal(id) {
            const item = inventory.find(i => i.id === id);
            if (!item) return;

            editingItemId = id;
            document.getElementById("modalTitle").textContent = "Edit Item";
            document.getElementById("modalName").value = item.name;
            document.getElementById("modalCategory").value = item.category || "";
            document.getElementById("modalUnit").value = item.unit || "Pcs";
            document.getElementById("modalStock").value = item.stock || 0;
            document.getElementById("modalLowStock").value = item.lowStock || 5;
            document.getElementById("modalBuyPrice").value = item.buyPrice || 0;
            document.getElementById("modalSellPrice").value = item.sellPrice || item.price || 0;
            document.getElementById("modalGst").value = item.gst || 18;
            document.getElementById("modalHsn").value = item.hsn || "";
            document.getElementById("itemModal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("itemModal").classList.remove("active");
        }

        async function saveItem() {
            const name = document.getElementById("modalName").value.trim();
            const category = document.getElementById("modalCategory").value.trim();
            const unit = document.getElementById("modalUnit").value;
            const stock = parseFloat(document.getElementById("modalStock").value) || 0;
            const lowStock = parseFloat(document.getElementById("modalLowStock").value) || 5;
            const buyPrice = parseFloat(document.getElementById("modalBuyPrice").value) || 0;
            const sellPrice = parseFloat(document.getElementById("modalSellPrice").value) || 0;
            const gst = parseFloat(document.getElementById("modalGst").value) || 18;
            const hsn = document.getElementById("modalHsn").value.trim();

            if (!name) {
                alert("Please enter item name");
                return;
            }

            if (sellPrice === 0) {
                alert("Please enter sell price");
                return;
            }

            const itemData = {
                name,
                category,
                unit,
                stock,
                lowStock,
                buyPrice,
                sellPrice,
                price: sellPrice, // for backward compatibility with billing
                gst,
                hsn,
                updatedAt: new Date().toISOString()
            };

            if (editingItemId) {
                // Update existing
                const index = inventory.findIndex(i => i.id === editingItemId);
                if (index!== -1) {
                    inventory[index] = {...inventory[index],...itemData };
                }

                if (currentUser) {
                    try {
                        await db.collection('shops').doc(currentUser.uid)
            .collection('inventory').doc(editingItemId).update(itemData);
                    } catch (e) {
                        console.error('Firebase update error:', e);
                    }
                }
            } else {
                // Add new
                const newItem = {
                    id: 'inv_' + Date.now(),
                  ...itemData,
                    createdAt: new Date().toISOString()
                };

                inventory.push(newItem);

                if (currentUser) {
                    try {
                        await db.collection('shops').doc(currentUser.uid)
            .collection('inventory').add(newItem);
                    } catch (e) {
                        console.error('Firebase save error:', e);
                    }
                }
            }

            localStorage.setItem("inventory", JSON.stringify(inventory));
            closeModal();
            renderInventory();
            updateStats();
        }

        async function deleteItem(id) {
            if (!confirm("Are you sure you want to delete this item?")) return;

            inventory = inventory.filter(i => i.id!== id);
            localStorage.setItem("inventory", JSON.stringify(inventory));

            if (currentUser) {
                try {
                    await db.collection('shops').doc(currentUser.uid)
          .collection('inventory').doc(id).delete();
                } catch (e) {
                    console.error('Firebase delete error:', e);
                }
            }

            renderInventory();
            updateStats();
        }

        // Close modal on outside click
        document.getElementById("itemModal").addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
