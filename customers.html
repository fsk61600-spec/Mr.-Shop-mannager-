<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Customers - My Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            color: #0f172a;
            min-height: 100vh;
        }

 .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

 .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

 .left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

 .back-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: 0.3s;
        }

 .back-btn:hover {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            transform: scale(1.08) rotate(-5deg);
        }

 .page-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

 .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

 .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

 .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

 .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

 .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

 .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #64748b;
        }

 .add-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

 .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.5);
        }

 .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

 .customer-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: 0.3s;
            animation: fadeInUp 0.4s ease-out;
        }

 .customer-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            border-color: #3b82f6;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

 .customer-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

 .customer-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: white;
        }

 .customer-info {
            flex: 1;
        }

 .customer-name {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 4px;
        }

 .customer-phone {
            font-size: 14px;
            color: #64748b;
            font-weight: 600;
        }

 .customer-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
        }

 .stat-item {
            text-align: center;
        }

 .stat-label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

 .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
        }

 .stat-value.pending {
            color: #ef4444;
        }

 .customer-actions {
            display: flex;
            gap: 8px;
        }

 .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

 .btn-edit {
            background: #eff6ff;
            color: #3b82f6;
        }

 .btn-edit:hover {
            background: #dbeafe;
        }

 .btn-delete {
            background: #fef2f2;
            color: #ef4444;
        }

 .btn-delete:hover {
            background: #fee2e2;
        }

 .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

 .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

 .empty-text {
            font-size: 18px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

 .empty-subtext {
            font-size: 14px;
            color: #94a3b8;
        }

        /* Modal */
 .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

 .modal.active {
            display: flex;
        }

 .modal-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.9) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

 .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            color: #0f172a;
        }

 .form-group {
            margin-bottom: 20px;
        }

 .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

 .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

 .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

 .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

 .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }

 .btn-cancel {
            background: #f1f5f9;
            color: #64748b;
        }

 .btn-cancel:hover {
            background: #e2e8f0;
        }

 .btn-save {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
        }

 .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.6);
        }

        @media (max-width: 768px) {
 .container { padding: 20px 16px; }
 .customers-grid { grid-template-columns: 1fr; }
 .top-actions { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="left-section">
                <button class="back-btn" onclick="location.href='index.html'">←</button>
                <div class="page-title">Customers</div>
            </div>
        </div>
    </nav>

    <!-- Container -->
    <div class="container">
        <!-- Top Actions -->
        <div class="top-actions">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput"
                       placeholder="Search customers..."
                       oninput="filterCustomers()">
            </div>
            <button class="add-btn" onclick="openAddModal()">
                <span>➕</span>
                <span>Add Customer</span>
            </button>
        </div>

        <!-- Customers Grid -->
        <div class="customers-grid" id="customersGrid">
            <!-- Customers will be loaded here -->
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="customerModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Add Customer</div>
            <div class="form-group">
                <label class="form-label">Customer Name *</label>
                <input type="text" class="form-input" id="modalName" placeholder="Enter customer name">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" id="modalPhone" placeholder="+91 98765 43210">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="modalEmail" placeholder="customer@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" class="form-input" id="modalAddress" placeholder="Enter address">
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn btn-save" onclick="saveCustomer()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQOR7tuWvX_ysKUOQcMnAbtVLLMIQzHEI",
            authDomain: "shop-ff6e6.firebaseapp.com",
            projectId: "shop-ff6e6",
            storageBucket: "shop-ff6e6.firebasestorage.app",
            messagingSenderId: "282249658606",
            appId: "1:282249658606:web:9bd31f378935795f52b3ff"
        };

        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {}

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let customers = [];
        let sales = [];
        let editingCustomerId = null;

        auth.onAuthStateChanged(async user => {
            const loginType = localStorage.getItem("loginType");

            if(!user && loginType!== "dev") {
                location.href = "login.html";
                return;
            }

            currentUser = user;
            await loadData();
            renderCustomers();
        });

        async function loadData() {
            customers = await loadCollection("customers");
            sales = await loadCollection("sales");
        }

        async function loadCollection(collection) {
            if (localStorage.getItem("loginType") === "dev") {
                return JSON.parse(localStorage.getItem(collection) || "[]");
            }

            if (currentUser) {
                try {
                    const snapshot = await db.collection('shops').doc(currentUser.uid)
           .collection(collection).get();
                    const data = snapshot.docs
           .filter(doc => doc.id!== '_init')
           .map(doc => ({ id: doc.id,...doc.data() }));
                    localStorage.setItem(collection, JSON.stringify(data));
                    return data;
                } catch (e) {
                    console.error('Firebase load error:', e);
                }
            }

            return JSON.parse(localStorage.getItem(collection) || "[]");
        }

function renderCustomers() {
    const grid = document.getElementById("customersGrid");
    const searchTerm = document.getElementById("searchInput").value.toLowerCase();

    let filtered = customers.filter(c =>
        c.name.toLowerCase().includes(searchTerm) ||
        (c.phone && c.phone.includes(searchTerm))
    );

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">👥</div>
                <div class="empty-text">No customers found</div>
                <div class="empty-subtext">Add your first customer to get started</div>
            </div>
        `;
        return;
    }

    grid.innerHTML = filtered.map(customer => {
        const customerSales = sales.filter(s => s.customerId === customer.id || s.customerName === customer.name);
        const totalBills = customerSales.length;
        const totalAmount = customerSales.reduce((sum, s) => sum + (s.total || 0), 0);
        const pendingAmount = customerSales.reduce((sum, s) => sum + (s.pending || 0), 0);

        const initials = customer.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

        return `
            <div class="customer-card" onclick="viewCustomerDetails('${customer.id}')" style="cursor: pointer;">
                <div class="customer-header">
                    <div class="customer-avatar">${initials}</div>
                    <div class="customer-info">
                        <div class="customer-name">${customer.name}</div>
                        <div class="customer-phone">${customer.phone || 'No Phone'}</div>
                    </div>
                </div>
                <div class="customer-stats">
                    <div class="stat-item">
                        <div class="stat-label">Total Bills</div>
                        <div class="stat-value">${totalBills}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Total Spent</div>
                        <div class="stat-value">₹${totalAmount.toFixed(0)}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value pending">₹${pendingAmount.toFixed(0)}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Last Bill</div>
                        <div class="stat-value" style="font-size: 14px;">${customerSales.length > 0? new Date(customerSales[customerSales.length - 1].date).toLocaleDateString('en-IN', {day: '2-digit', month: 'short'}) : 'N/A'}</div>
                    </div>
                </div>
                <div class="customer-actions">
                    <button class="action-btn btn-edit" onclick="event.stopPropagation(); openEditModal('${customer.id}')">✏️ Edit</button>
                    <button class="action-btn btn-delete" onclick="event.stopPropagation(); deleteCustomer('${customer.id}')">🗑️ Delete</button>
                </div>
            </div>
        `;
    }).join('');
}

// Add this function
function viewCustomerDetails(id) {
    location.href = `customer-details.html?id=${id}`;
}

        function filterCustomers() {
            renderCustomers();
        }

        function openAddModal() {
            editingCustomerId = null;
            document.getElementById("modalTitle").textContent = "Add Customer";
            document.getElementById("modalName").value = "";
            document.getElementById("modalPhone").value = "";
            document.getElementById("modalEmail").value = "";
            document.getElementById("modalAddress").value = "";
            document.getElementById("customerModal").classList.add("active");
        }

        function openEditModal(id) {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;

            editingCustomerId = id;
            document.getElementById("modalTitle").textContent = "Edit Customer";
            document.getElementById("modalName").value = customer.name;
            document.getElementById("modalPhone").value = customer.phone || "";
            document.getElementById("modalEmail").value = customer.email || "";
            document.getElementById("modalAddress").value = customer.address || "";
            document.getElementById("customerModal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("customerModal").classList.remove("active");
        }

        async function saveCustomer() {
            const name = document.getElementById("modalName").value.trim();
            const phone = document.getElementById("modalPhone").value.trim();
            const email = document.getElementById("modalEmail").value.trim();
            const address = document.getElementById("modalAddress").value.trim();

            if (!name) {
                alert("Please enter customer name");
                return;
            }

            if (editingCustomerId) {
                // Update existing
                const index = customers.findIndex(c => c.id === editingCustomerId);
                if (index!== -1) {
                    customers[index] = {...customers[index], name, phone, email, address };
                }

                if (currentUser) {
                    try {
                        await db.collection('shops').doc(currentUser.uid)
             .collection('customers').doc(editingCustomerId).update({ name, phone, email, address });
                    } catch (e) {
                        console.error('Firebase update error:', e);
                    }
                }
            } else {
                // Add new
                const newCustomer = {
                    id: 'cust_' + Date.now(),
                    name,
                    phone,
                    email,
                    address,
                    createdAt: new Date().toISOString()
                };

                customers.push(newCustomer);

                if (currentUser) {
                    try {
                        await db.collection('shops').doc(currentUser.uid)
             .collection('customers').add(newCustomer);
                    } catch (e) {
                        console.error('Firebase save error:', e);
                    }
                }
            }

            localStorage.setItem("customers", JSON.stringify(customers));
            closeModal();
            renderCustomers();
        }

        async function deleteCustomer(id) {
            if (!confirm("Are you sure you want to delete this customer?")) return;

            customers = customers.filter(c => c.id!== id);
            localStorage.setItem("customers", JSON.stringify(customers));

            if (currentUser) {
                try {
                    await db.collection('shops').doc(currentUser.uid)
           .collection('customers').doc(id).delete();
                } catch (e) {
                    console.error('Firebase delete error:', e);
                }
            }

            renderCustomers();
        }

        // Close modal on outside click
        document.getElementById("customerModal").addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
