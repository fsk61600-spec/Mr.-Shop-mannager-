<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>All Bills - My Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            color: #0f172a;
            min-height: 100vh;
        }

.navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

.nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

.left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

.back-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: 0.3s;
        }

.back-btn:hover {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            transform: scale(1.08) rotate(-5deg);
        }

.page-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

.container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

.stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

.stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

.stat-card.highlight {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-color: #bfdbfe;
        }

.stat-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

.stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
        }

.stat-value.pending {
            color: #ef4444;
        }

.stat-value.paid {
            color: #10b981;
        }

.top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

.filters-group {
            display: flex;
            gap: 12px;
            flex: 1;
            flex-wrap: wrap;
        }

.search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

.search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

.search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

.search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #64748b;
        }

.filter-select,.date-input {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }

.new-bill-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

.new-bill-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.5);
        }

.bills-table-wrapper {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            overflow-x: auto;
        }

.bills-table {
            width: 100%;
            min-width: 1000px;
            border-collapse: collapse;
        }

.bills-table thead {
            background: #f8fafc;
        }

.bills-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            white-space: nowrap;
        }

.bills-table td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 15px;
            font-weight: 600;
        }

.bills-table tr:last-child td {
            border-bottom: none;
        }

.bills-table tr:hover {
            background: #f8fafc;
        }

.bill-no {
            color: #3b82f6;
            font-weight: 800;
            cursor: pointer;
        }

.bill-no:hover {
            text-decoration: underline;
        }

.customer-name {
            font-weight: 700;
            color: #0f172a;
        }

.status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

.status-paid {
            background: #dcfce7;
            color: #15803d;
        }

.status-pending {
            background: #fee2e2;
            color: #dc2626;
        }

.status-partial {
            background: #fef3c7;
            color: #b45309;
        }

.bill-actions {
            display: flex;
            gap: 8px;
        }

.action-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

.btn-view {
            background: #eff6ff;
            color: #3b82f6;
        }

.btn-view:hover {
            background: #dbeafe;
        }

.btn-print {
            background: #f3e8ff;
            color: #8b5cf6;
        }

.btn-print:hover {
            background: #e9d5ff;
        }

.btn-delete {
            background: #fef2f2;
            color: #ef4444;
        }

.btn-delete:hover {
            background: #fee2e2;
        }

.empty-state {
            text-align: center;
            padding: 60px 20px;
        }

.empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

.empty-text {
            font-size: 18px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

.empty-subtext {
            font-size: 14px;
            color: #94a3b8;
        }

        /* Bill Details Modal */
.modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

.modal.active {
            display: flex;
        }

.modal-content {
            background: white;
            border-radius: 20px;
            padding: 36px;
            max-width: 800px;
            width: 100%;
            animation: modalSlideIn 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.9) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

.modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
        }

.modal-title {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
        }

.close-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f1f5f9;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
        }

.close-btn:hover {
            background: #e2e8f0;
        }

.bill-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

.info-item {
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
        }

.info-label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

.info-value {
            font-size: 16px;
            font-weight: 800;
            color: #0f172a;
        }

.items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

.items-table th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
        }

.items-table td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            font-weight: 600;
        }

.totals-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

.total-box {
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
        }

.total-box.grand {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 2px solid #bfdbfe;
        }

.total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 600;
        }

.total-row.grand-total {
            border-top: 2px solid #3b82f6;
            padding-top: 12px;
            margin-top: 8px;
            font-size: 18px;
            font-weight: 800;
        }

.modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

.modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }

.btn-print-modal {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

.btn-whatsapp-modal {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        @media (max-width: 768px) {
.container { padding: 20px 16px; }
.stats-grid { grid-template-columns: 1fr 1fr; }
.filters-group { flex-direction: column; }
.totals-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="left-section">
                <button class="back-btn" onclick="location.href='index.html'">←</button>
                <div class="page-title">All Bills</div>
            </div>
        </div>
    </nav>

    <!-- Container -->
    <div class="container">
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card highlight">
                <div class="stat-label">Total Bills</div>
                <div class="stat-value" id="totalBills">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Sales</div>
                <div class="stat-value" id="totalSales">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Collected</div>
                <div class="stat-value paid" id="totalCollected">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Pending</div>
                <div class="stat-value pending" id="totalPending">₹0</div>
            </div>
        </div>

        <!-- Top Actions -->
        <div class="top-actions">
            <div class="filters-group">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput"
                           placeholder="Search by bill no or customer..."
                           oninput="filterBills()">
                </div>
                <select class="filter-select" id="statusFilter" onchange="filterBills()">
                    <option value="all">All Status</option>
                    <option value="paid">Paid</option>
                    <option value="partial">Partial</option>
                    <option value="pending">Pending</option>
                </select>
                <input type="date" class="date-input" id="dateFilter" onchange="filterBills()">
            </div>
            <button class="new-bill-btn" onclick="location.href='billing.html'">
                <span>➕</span>
                <span>New Bill</span>
            </button>
        </div>

        <!-- Bills Table -->
        <div class="bills-table-wrapper">
            <table class="bills-table">
                <thead>
                    <tr>
                        <th>Bill No</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Paid</th>
                        <th>Pending</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="billsTableBody">
                    <!-- Bills will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Bill Details Modal -->
    <div class="modal" id="billModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Bill Details</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody">
                <!-- Bill details will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQOR7tuWvX_ysKUOQcMnAbtVLLMIQzHEI",
            authDomain: "shop-ff6e6.firebaseapp.com",
            projectId: "shop-ff6e6",
            storageBucket: "shop-ff6e6.firebasestorage.app",
            messagingSenderId: "282249658606",
            appId: "1:282249658606:web:9bd31f378935795f52b3ff"
        };

        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {}

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let sales = [];
        let customers = [];

        auth.onAuthStateChanged(async user => {
            const loginType = localStorage.getItem("loginType");

            if(!user && loginType!== "dev") {
                location.href = "login.html";
                return;
            }

            currentUser = user;
            await loadData();
            renderBills();
            updateStats();
        });

        async function loadData() {
            sales = await loadCollection("sales");
            customers = await loadCollection("customers");
        }

        async function loadCollection(collection) {
            if (localStorage.getItem("loginType") === "dev") {
                return JSON.parse(localStorage.getItem(collection) || "[]");
            }

            if (currentUser) {
                try {
                    const snapshot = await db.collection('shops').doc(currentUser.uid)
          .collection(collection).get();
                    const data = snapshot.docs
          .filter(doc => doc.id!== '_init')
          .map(doc => ({ id: doc.id,...doc.data() }));
                    localStorage.setItem(collection, JSON.stringify(data));
                    return data;
                } catch (e) {
                    console.error('Firebase load error:', e);
                }
            }

            return JSON.parse(localStorage.getItem(collection) || "[]");
        }

        function updateStats() {
            const totalBills = sales.length;
            const totalSales = sales.reduce((sum, s) => sum + (s.total || 0), 0);
            const totalCollected = sales.reduce((sum, s) => sum + (s.paid || 0), 0);
            const totalPending = sales.reduce((sum, s) => sum + (s.pending || 0), 0);

            document.getElementById("totalBills").textContent = totalBills;
            document.getElementById("totalSales").textContent = `₹${totalSales.toFixed(0)}`;
            document.getElementById("totalCollected").textContent = `₹${totalCollected.toFixed(0)}`;
            document.getElementById("totalPending").textContent = `₹${totalPending.toFixed(0)}`;
        }

        function renderBills() {
            const tbody = document.getElementById("billsTableBody");
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const statusFilter = document.getElementById("statusFilter").value;
            const dateFilter = document.getElementById("dateFilter").value;

            let filtered = sales.filter(bill => {
                const matchesSearch = bill.billNo.toLowerCase().includes(searchTerm) ||
                                     (bill.customerName && bill.customerName.toLowerCase().includes(searchTerm)) ||
                                     (bill.customerPhone && bill.customerPhone.includes(searchTerm));

                let matchesStatus = true;
                if (statusFilter === 'paid') matchesStatus = (bill.pending || 0) === 0;
                else if (statusFilter === 'partial') matchesStatus = (bill.paid || 0) > 0 && (bill.pending || 0) > 0;
                else if (statusFilter === 'pending') matchesStatus = (bill.paid || 0) === 0;

                let matchesDate = true;
                if (dateFilter) {
                    const billDate = new Date(bill.date).toISOString().split('T')[0];
                    matchesDate = billDate === dateFilter;
                }

                return matchesSearch && matchesStatus && matchesDate;
            });

            // Sort by date descending
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10">
                            <div class="empty-state">
                                <div class="empty-icon">📋</div>
                                <div class="empty-text">No bills found</div>
                                <div class="empty-subtext">Create your first bill to get started</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(bill => {
                const date = new Date(bill.date).toLocaleDateString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });

                const itemCount = bill.items? bill.items.length : 0;
                const paid = bill.paid || 0;
                const pending = bill.pending || 0;
                const total = bill.total || 0;

                let status = 'paid';
                let statusText = 'Paid';
                if (pending > 0 && paid === 0) {
                    status = 'pending';
                    statusText = 'Pending';
                } else if (pending > 0 && paid > 0) {
                    status = 'partial';
                    statusText = 'Partial';
                }

                return `
                    <tr>
                        <td><span class="bill-no" onclick="viewBill('${bill.id}')">${bill.billNo}</span></td>
                        <td>${date}</td>
                        <td class="customer-name">${bill.customerName || 'Round Off Customer'}</td>
                        <td>${bill.customerPhone || '-'}</td>
                        <td>${itemCount}</td>
                        <td>₹${total.toFixed(2)}</td>
                        <td>₹${paid.toFixed(2)}</td>
                        <td>₹${pending.toFixed(2)}</td>
                        <td><span class="status-badge status-${status}">${statusText}</span></td>
                        <td>
                            <div class="bill-actions">
                                <button class="action-btn btn-view" onclick="viewBill('${bill.id}')">View</button>
                                <button class="action-btn btn-print" onclick="printBill('${bill.id}')">Print</button>
                                <button class="action-btn btn-delete" onclick="deleteBill('${bill.id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterBills() {
            renderBills();
        }

        function viewBill(id) {
            const bill = sales.find(s => s.id === id);
            if (!bill) return;

            const modalBody = document.getElementById("modalBody");
            const date = new Date(bill.date).toLocaleDateString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            modalBody.innerHTML = `
                <div class="bill-info-grid">
                    <div class="info-item">
                        <div class="info-label">Bill No</div>
                        <div class="info-value">${bill.billNo}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Date & Time</div>
                        <div class="info-value">${date}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Customer</div>
                        <div class="info-value">${bill.customerName || 'Round Off Customer'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Phone</div>
                        <div class="info-value">${bill.customerPhone || '-'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Payment Mode</div>
                        <div class="info-value">${bill.paymentMode || 'Cash'}</div>
                    </div>
                </div>

                <h3 style="margin-bottom: 12px; font-size: 16px; font-weight: 800;">Items</h3>
                <table class="items-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Rate</th>
                            <th>GST</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bill.items.map((item, i) => `
                            <tr>
                                <td>${i + 1}</td>
                                <td>${item.name}</td>
                                <td>${item.qty}</td>
                                <td>₹${item.rate.toFixed(2)}</td>
                                <td>${item.gst}%</td>
                                <td>₹${item.totalAmount.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                <div class="totals-section">
                    <div class="total-box">
                        <div class="total-row">
                            <span>Subtotal:</span>
                            <span>₹${(bill.subtotal || 0).toFixed(2)}</span>
                        </div>
                        <div class="total-row">
                            <span>CGST:</span>
                            <span>₹${(bill.cgst || 0).toFixed(2)}</span>
                        </div>
                        <div class="total-row">
                            <span>SGST:</span>
                            <span>₹${(bill.sgst || 0).toFixed(2)}</span>
                        </div>
                        <div class="total-row">
                            <span>Discount:</span>
                            <span>₹${(bill.discount || 0).toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="total-box grand">
                        <div class="total-row grand-total">
                            <span>Grand Total:</span>
                            <span>₹${(bill.total || 0).toFixed(2)}</span>
                        </div>
                        <div class="total-row">
                            <span>Paid:</span>
                            <span>₹${(bill.paid || 0).toFixed(2)}</span>
                        </div>
                        <div class="total-row">
                            <span>Pending:</span>
                            <span style="color: #ef4444;">₹${(bill.pending || 0).toFixed(2)}</span>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="modal-btn btn-print-modal" onclick="printBill('${bill.id}')">🖨️ Print</button>
                    <button class="modal-btn btn-whatsapp-modal" onclick="shareWhatsApp('${bill.id}')">📱 WhatsApp</button>
                </div>
            `;

            document.getElementById("billModal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("billModal").classList.remove("active");
        }

        function printBill(id) {
            const bill = sales.find(s => s.id === id);
            if (!bill) return;

            const printWindow = window.open('', '_blank');
            const shopData = JSON.parse(localStorage.getItem("shopDetails") || "{}");

            printWindow.document.write(`
                <html>
                <head>
                    <title>Bill ${bill.billNo}</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        h1 { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; }
                        .info { margin: 10px 0; }
                        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        th, td { border: 1px solid #000; padding: 8px; text-align: left; }
                        th { background: #f0f0f0; }
                        .total { text-align: right; font-weight: bold; font-size: 18px; }
                    </style>
                </head>
                <body>
                    <h1>${shopData.shopName || 'MY SHOP'}</h1>
                    <div class="info">Bill No: ${bill.billNo}</div>
                    <div class="info">Date: ${new Date(bill.date).toLocaleDateString('en-IN')}</div>
                    <div class="info">Customer: ${bill.customerName || 'Round Off Customer'}</div>
                    <div class="info">Phone: ${bill.customerPhone || '-'}</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Rate</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bill.items.map(item => `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.qty}</td>
                                    <td>₹${item.rate.toFixed(2)}</td>
                                    <td>₹${item.totalAmount.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="total">Total: ₹${bill.total.toFixed(2)}</div>
                    <div class="total">Paid: ₹${bill.paid.toFixed(2)}</div>
                    <div class="total">Pending: ₹${bill.pending.toFixed(2)}</div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        async function deleteBill(id) {
            if (!confirm("Are you sure you want to delete this bill?")) return;

            sales = sales.filter(s => s.id!== id);
            localStorage.setItem("sales", JSON.stringify(sales));

            if (currentUser) {
                try {
                    await db.collection('shops').doc(currentUser.uid)
          .collection('sales').doc(id).delete();
                } catch (e) {
                    console.error('Firebase delete error:', e);
                }
            }

            renderBills();
            updateStats();
        }

        function shareWhatsApp(id) {
            const bill = sales.find(s => s.id === id);
            if (!bill) return;

            const shopData = JSON.parse(localStorage.getItem("shopDetails") || "{}");
            let message = `*${shopData.shopName || 'MY SHOP'}*\n\n`;
            message += `Bill No: ${bill.billNo}\n`;
            message += `Customer: ${bill.customerName || 'Round Off Customer'}\n`;
            message += `Total: ₹${bill.total.toFixed(2)}\n\n`;
            message += `Items:\n`;
            bill.items.forEach((item, i) => {
                message += `${i+1}. ${item.name} - ${item.qty} x ₹${item.rate} = ₹${item.totalAmount.toFixed(2)}\n`;
            });
            message += `\nThank you!`;

            const whatsappUrl = `https://wa.me/${bill.customerPhone || ''}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        // Close modal on outside click
        document.getElementById("billModal").addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
